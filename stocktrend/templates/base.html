<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}StockTrend{% endblock %}</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">    
</head>
<body>
    <header>
        <h1><a href="{{ url_for('home.home')}}">StockTrend</a></h1>     
    </header>
    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <ul class="flashes">
                {% for category, message in messages %}
                    <li class="flash flash-{{ category}}">{{ message}}</li>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>
</html>
